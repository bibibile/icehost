name: IceHost Hourly KeepAlive

on:
  workflow_dispatch: # 由外部定时（如 cron-job.org）进行触发

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🛠️ 关键修改：安装 xvfb 虚拟屏幕组件
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils
          pip install playwright requests
          playwright install chromium

      # ⚡ sing-box 代理配置（保持不变）
      - name: Install and Start sing-box Proxy
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$NODE_LINK" ]; then
            echo "ℹ️ 未配置 NODE_LINK Secret，将使用 GitHub Actions 本地网络直连。"
          else
            echo "📥 获取 sing-box 最新版本..."
            API_RESP=$(curl -sf -H "Authorization: token ${GH_TOKEN}" https://api.github.com/repos/SagerNet/sing-box/releases/latest)
            SINGBOX_VER=$(echo "$API_RESP" | sed -n 's/.*"tag_name"[[:space:]]*:[[:space:]]*"v\{0,1\}\([^"]*\)".*/\1/p')
            echo "  最新版本: ${SINGBOX_VER}"
            
            curl -fLo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
            tar -xzf sing-box.tar.gz
            cp "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
            chmod +x ./sing-box
            
            echo "📝 转换节点链接为 sing-box 配置..."
            python convert.py "$NODE_LINK"
            
            echo "🚀 启动 sing-box..."
            nohup ./sing-box run -c config.json > sing-box.log 2>&1 &
            sleep 5
            
            echo "🔍 验证代理连通性..."
            if curl -x http://127.0.0.1:8080 -s --max-time 10 https://api.ip.sb/ip; then
              echo "✅ sing-box 代理启动成功"
              echo "ICEHOST_PROXY=http://127.0.0.1:8080" >> $GITHUB_ENV
            else
              echo "❌ 代理连通性测试失败，sing-box 日志："
              cat sing-box.log
              exit 1
            fi
          fi

      # 🚀 核心修改：使用 xvfb-run 启动 Python 脚本
      - name: Run check script
        env:
          ICEHOST_SERVER_URL: ${{ secrets.ICEHOST_SERVER_URL }}
          ICEHOST_COOKIES: ${{ secrets.ICEHOST_COOKIES }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python icehost_run.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: icehost-debug-screenshot
          path: icehost_debug_screenshot.png
          if-no-files-found: ignore
