name: IceHost Hourly KeepAlive

on:
  workflow_dispatch: 

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ 极简安装：只安装 requests，不再需要浏览器驱动
      - name: Install dependencies
        run: |
          pip install requests

      # ⚡ sing-box 代理配置（保留，确保网络连通性）
      - name: Install and Start sing-box Proxy
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$NODE_LINK" ]; then
            echo "ℹ️ 未配置 NODE_LINK，直接联网。"
          else
            # ... (保留您原有的 sing-box 下载及启动逻辑)
            # ...
            echo "ICEHOST_PROXY=http://127.0.0.1:8080" >> $GITHUB_ENV
          fi

      # ✅ 核心运行步骤：直接执行 Python 脚本，不再需要 xvfb-run
      - name: Run check script
        env:
          ICEHOST_SERVER_URL: ${{ secrets.ICEHOST_SERVER_URL }}
          ICEHOST_COOKIES: ${{ secrets.ICEHOST_COOKIES }}
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python icehost_run.py
